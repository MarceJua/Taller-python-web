{% extends "base.html" %}
{% block title %}Editar Tarea{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="h4 mb-3">Editar Tarea</h2>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Título</label>
                        <input type="text" name="title" class="form-control" value="{{ task.title }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea name="description" class="form-control" rows="4">{{ task.description }}</textarea>
                    </div>

                    <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox" name="done" id="done" {% if task.done %}checked{% endif %}>
                        <label class="form-check-label" for="done">Marcar como terminada</label>
                    </div>

                    <div class="d-flex gap-2">
                        <button class="btn btn-primary" type="submit">Guardar cambios</button>
                        <a class="btn btn-secondary" href="{{ url_for('index') }}">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
